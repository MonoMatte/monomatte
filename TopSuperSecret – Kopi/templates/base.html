<!DOCTYPE html>
<html lang="{{ get_locale() }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/monologo.png') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" rel="stylesheet">
</head>

<body>

<header class="glass-header d-flex align-items-center justify-content-between px-4 py-3">

    <!-- VENSTRE SIDE: Logo + Meny -->
    <div class="d-flex align-items-center gap-4">

        <!-- Logo -->
        <div class="d-flex align-items-center gap-3">
            <a href="/" class="d-inline-flex">
                <img class="header__img" src="{{ url_for('static', filename='img/monologo.png') }}" alt="SA">
            </a>
            <h3 class="m-0 fw-semibold logo-text">{{ _("MonoMatte") }}</h3>
        </div>

        <!-- Meny-knapper -->
        <nav class="d-flex gap-4 align-items-center">
            <a href="{{ url_for('index') }}" class="nav-link dashboard-link">{{ _("Hjem") }}</a>
            <a href="{{ url_for('about') }}" class="nav-link dashboard-link">{{ _("Temaer") }}</a>
            <a href="{{ url_for('oppgaver') }}" class="nav-link dashboard-link">{{ _("Oppgaver") }}</a>
        </nav>

    </div>

    <!-- HØYRE SIDE: Logg inn, Registrer deg, Språk -->
    <div class="d-flex gap-3 align-items-center">

        <a href="/login" class="btn login-btn">Logg inn</a>
        <a href="/register" class="btn register-btn">Registrer deg</a>

        <div class="dropdown">
            <button class="btn lang-dropdown-btn dropdown-toggle" type="button" data-bs-toggle="dropdown">
                 {{ _("Språk") }}
            </button>
            <ul class="dropdown-menu glass-dropdown">
                <li><a class="dropdown-item" href="?lang=nb">🇳🇴 {{ _("Bokmål") }}</a></li>
                <li><a class="dropdown-item" href="?lang=nn">🇳🇴 {{ _("Nynorsk") }}</a></li>
            </ul>
        </div>

    </div>

</header>

<main class="content-wrapper">
    {% block body %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
